receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
  prometheus:
    config:
      global:
        scrape_interval: 5s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: dk-webapplication1
          static_configs:
            - targets: [dk-webapplication1:8080]

processors:
  batch:
    timeout: 10s
  attributes:
    actions:
      - key: host.location
        action: insert
        value: homo
  span:
    name:
      from_attributes: [span.name.original, host.location]
      separator: ':'
  filter:
    metrics:
      include:
        match_type: strict
        metric_names:
          - vote_count
  tail_sampling:
    decision_wait: 10s
    num_traces: 100
    expected_new_traces_per_sec: 10
    policies:
      - name: policy-1
        type: status_code
        status_code:
          status_codes: [ERROR]

exporters:
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    external_labels:
      via: collector
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: detailed
    sampling_initial: 1
    sampling_thereafter: 1
  otlphttp/logs:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

extensions:
  health_check:
  zpages:

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp, jaeger]
      processors: [batch, attributes, span]
      exporters: [otlp, debug]
    metrics:
      receivers: [prometheus, otlp]
      processors: [batch, filter]
      exporters: [prometheusremotewrite, otlp]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]