global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dk-webapplication1'
    scrape_interval: 5s
    static_configs:
      - targets:
        - dk-webapplication1:8080

  - job_name: 'prometheus'
    # Override the global default and scrape targets from this job every 5 seconds.
    scrape_interval: 5s
    static_configs:
      - targets:
        - localhost:9090